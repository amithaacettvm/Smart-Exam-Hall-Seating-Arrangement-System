<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Hall Seating Arrangement Automation System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container py-5">

    <div class="text-center mb-5">
        <h1>Exam Hall Seating Arrangement Automation System</h1>
        <p class="text-muted">
            IEDC Side Quest Project
        </p>
    </div>

    <!-- Student Registration Card -->
    <div class="card shadow-lg mb-4">
        <div class="card-body">

            <h3 class="mb-4">Student Registration</h3>

            <div class="row">

                <div class="col-md-6 mb-3">
                    <label class="form-label">
                        Registration Number
                    </label>

                    <input
                        type="text"
                        id="regNo"
                        class="form-control"
                        placeholder="Enter Registration Number">
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">
                        Branch
                    </label>

                    <select
                        id="branch"
                        class="form-select">

                        <option value="">
                            Select Branch
                        </option>

                        <option value="CSE">CSE</option>
                        <option value="ECE">ECE</option>
                        <option value="EEE">EEE</option>
                        <option value="ME">ME</option>
                        <option value="CE">CE</option>
                        <option value="IT">IT</option>

                    </select>
                </div>

            </div>

            <button
                class="btn btn-primary"
                onclick="addStudent()">

                Add Student

            </button>

        </div>
    </div>

    <!-- Registered Students -->
    <div class="card shadow-lg mb-4">
        <div class="card-body">

            <div class="d-flex justify-content-between align-items-center">
                <h3>Registered Students</h3>

                <span class="badge bg-success fs-6">
                    Total:
                    <span id="studentCount">0</span>
                </span>
            </div>

            <table class="table table-bordered table-hover mt-3">

                <thead class="table-dark">

                <tr>
                    <th>Registration Number</th>
                    <th>Branch</th>
                </tr>

                </thead>

                <tbody id="studentTable">

                </tbody>

            </table>

        </div>
    </div>

    <!-- Generate Seating -->
    <div class="text-center mb-4">

        <button
            class="btn btn-success btn-lg"
            onclick="generateSeats()">

            Generate Seating Arrangement

        </button>

    </div>

    <!-- Seating Arrangement -->
    <div class="card shadow-lg">

        <div class="card-body">

            <h3>Generated Seating Arrangement</h3>

            <table class="table table-striped table-bordered mt-3">

                <thead class="table-primary">

                <tr>
                    <th>Seat Number</th>
                    <th>Registration Number</th>
                    <th>Branch</th>
                </tr>

                </thead>

                <tbody id="seatTable">

                </tbody>

            </table>

        </div>

    </div>

</div>

<!-- JavaScript -->
<script src="script.js"></script>

</body>
</html>
